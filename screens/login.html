<section id="login" class="screen-login">

  <h2>Connexion</h2>

  <p class="text-muted small">
    Accès sécurisé – Veuillez vous connecter pour accéder au Livret Digitalisé Vision Essais.
  </p>

  <form id="login-form" onsubmit="event.preventDefault();">
    
    <input 
      id="login-email" 
      type="email" 
      placeholder="Adresse email (ex: prenom.nom@reseau.sncf.fr)"
      autocomplete="username"
      required
    >

    <input 
      id="login-pass" 
      type="password" 
      placeholder="Mot de passe"
      autocomplete="current-password"
      required
    >

    <p id="login-error" class="error"></p>

    <button type="submit" id="btn-login-submit" class="btn-primary" style="width: 100%; margin-top: 10px;">
      Connexion
    </button>
    
  </form>

</section>
